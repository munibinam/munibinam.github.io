# -------------------------------------------------------------
# Munib Inam — Personal Website (Jekyll / Minimal‑Mistakes)
# Clean, well‑commented configuration
# -------------------------------------------------------------

# ──────────────────────────────────────────────────────────────
#  Core Site Settings
# ──────────────────────────────────────────────────────────────
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "contrast"
locale: "en-US"

# Identity
title: "Munib Inam"
title_separator: "-"
name: "Munib Inam"
# Short tagline used by search engines and social cards
description: "PhD Candidate in Agricultural Economics at the University of Kentucky"

# URL structure (leave baseurl empty for GitHub Pages user site)
url: "https://munibinam.github.io"
baseurl: ""
repository: "munibinam/munibinam.github.io"

# Hero / social preview image
teaser: "/images/profile2.jpg"

# UX options
breadcrumbs: false
words_per_minute: 160

# Search
search: true
search_full_content: true
search_provider: "lunr"   # Options: lunr (default), algolia, google

# ──────────────────────────────────────────────────────────────
#  Comments (disabled by default)
# ──────────────────────────────────────────────────────────────
comments:
  provider: false          # e.g. "disqus", "giscus" when enabled

# ──────────────────────────────────────────────────────────────
#  SEO Verification tokens (optional)
# ──────────────────────────────────────────────────────────────
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# ──────────────────────────────────────────────────────────────
#  Social Sharing & Open‑Graph
# ──────────────────────────────────────────────────────────────
twitter:
  username: ""             # your @handle (without the @)

facebook:
  username: ""
  app_id: ""
  publisher: ""

og_image: "/images/profile2.jpg"

# Schema.org person profile
social:
  type: "Person"
  name: "Munib Inam"
  links: []                # populate with full URLs if desired

# ──────────────────────────────────────────────────────────────
#  Analytics (disabled)
# ──────────────────────────────────────────────────────────────
analytics:
  provider: false          # set to "google-gtag" and add ID to enable
  google:
    tracking_id:

# ──────────────────────────────────────────────────────────────
#  Author block (appears in sidebars / footers)
# ──────────────────────────────────────────────────────────────
author:
  name: "Munib Inam"
  avatar: "/images/profile2.jpg"
  bio: "PhD Candidate in Agricultural Economics at the University of Kentucky"
  location: "Lexington, Kentucky"
  email: "munib.inam@uky.edu"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:munib.inam@uky.edu"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/munib-inam"
    - label: "Photography"
      icon: "fas fa-fw fa-camera"
      url: "https://500px.com/p/min233"
    - label: "📄 CV"
      icon: "fas fa-fw fa-file-pdf"
      url: "/files/Inam_CV_2025.pdf"

# ──────────────────────────────────────────────────────────────
#  File Handling
# ──────────────────────────────────────────────────────────────
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# ──────────────────────────────────────────────────────────────
#  Conversion Settings
# ──────────────────────────────────────────────────────────────
markdown: "kramdown"
highlighter: "rouge"
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: "GFM"
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: "as_char"
  toc_levels: 1..6
  smart_quotes: "lsquo,rsquo,ldquo,rdquo"
  enable_coderay: false

# ──────────────────────────────────────────────────────────────
#  Custom Collections
# ──────────────────────────────────────────────────────────────
collections:
  teaching:
    output: true
    permalink: "/:collection/:path/"
  publications:
    output: true
    permalink: "/:collection/:path/"
  portfolio:
    output: true
    permalink: "/:collection/:path/"
  talks:
    output: true
    permalink: "/:collection/:path/"

# ──────────────────────────────────────────────────────────────
#  Defaults (layout, auth profile, share settings)
# ──────────────────────────────────────────────────────────────
defaults:
  # Posts
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

  # Pages
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true

  # Teaching
  - scope:
      path: ""
      type: "teaching"
    values:
      layout: "single"
      author_profile: true
      share: true
      comments: false

  # Publications
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "single"
      author_profile: true
      share: true
      comments: false

  # Portfolio
  - scope:
      path: ""
      type: "portfolio"
    values:
      layout: "single"
      author_profile: true
      share: true
      comments: false

  # Talks
  - scope:
      path: ""
      type: "talks"
    values:
      layout: "talk"
      author_profile: true
      share: true

# ──────────────────────────────────────────────────────────────
#  Styling
# ──────────────────────────────────────────────────────────────
sass:
  sass_dir: "_sass"
  style: "compressed"

# ──────────────────────────────────────────────────────────────
#  Pagination & URLs
# ──────────────────────────────────────────────────────────────
permalink: "/:categories/:title/"
paginate: 5
paginate_path: "/page:num/"
timezone: "America/Kentucky/Louisville"

# ──────────────────────────────────────────────────────────────
#  Plugins (GitHub‑Pages compatible)
# ──────────────────────────────────────────────────────────────
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# ──────────────────────────────────────────────────────────────
#  Archive pages
# ──────────────────────────────────────────────────────────────
category_archive:
  type: "liquid"
  path: "/categories/"

tag_archive:
  type: "liquid"
  path: "/tags/"

# ──────────────────────────────────────────────────────────────
#  HTML Compression
# ──────────────────────────────────────────────────────────────
compress_html:
  clippings: "all"
  ignore:
    envs: "development"

# ──────────────────────────────────────────────────────────────
#  Atom Feed
# ──────────────────────────────────────────────────────────────
atom_feed:
  path:       # leave blank to use /feed.xml
  hide: false
