# Reading Files

include:

  - .htaccess

  - _pages

  - files

exclude:

  - "*.sublime-project"

  - "*.sublime-workspace"

  - vendor

  - .asset-cache

  - .bundle

  - .jekyll-assets-cache

  - .sass-cache

  - assets/js/plugins

  - assets/js/_main.js

  - assets/js/vendor

  - Capfile

  - CHANGELOG

  - config

  - Gemfile

  - Gruntfile.js

  - gulpfile.js

  - LICENSE

  - log

  - node_modules

  - package.json

  - Rakefile

  - README

  - tmp

keep_files:

  - .git

  - .svn

encoding: "utf-8"

markdown_ext: "markdown,mkdown,mkdn,mkd,md"



# Conversion

markdown: kramdown

highlighter: rouge

lsi: false

excerpt_separator: "\n\n"

incremental: false



# Markdown Processing

kramdown:

  input: GFM

  hard_wrap: false

  auto_ids: true

  footnote_nr: 1

  entity_output: as_char

  toc_levels: 1..6

  smart_quotes: lsquo,rsquo,ldquo,rdquo

  enable_coderay: false



# Collections

collections:

  teaching:

    output: true

    permalink: /:collection/:path/

  publications:

    output: true

    permalink: /:collection/:path/

  portfolio:

    output: true

    permalink: /:collection/:path/

  talks:

    output: true

    permalink: /:collection/:path/



# Defaults

defaults:

  # _posts

  - scope:

      path: ""

      type: posts

    values:

      layout: single

      author_profile: true

      read_time: true

      comments: false

      share: true

      related: true

  # _pages

  - scope:

      path: ""

      type: pages

    values:

      layout: single

      author_profile: true

  # _teaching

  - scope:

      path: ""

      type: teaching

    values:

      layout: single

      author_profile: true

      share: true

      comments: false

  # _publications

  - scope:

      path: ""

      type: publications

    values:

      layout: single

      author_profile: true

      share: true

      comments: false

  # _portfolio

  - scope:

      path: ""

      type: portfolio

    values:

      layout: single

      author_profile: true

      share: true

      comments: false

  # _talks

  - scope:

      path: ""

      type: talks

    values:

      layout: talk

      author_profile: true

      share: true



# Sass/SCSS

sass:

  sass_dir: _sass

  style: compressed



# Outputting

permalink: /:categories/:title/

paginate: 5

paginate_path: /page:num/

timezone: America/Kentucky/Louisville



# Plugins (GitHub Pages compatible)

plugins:

  - jekyll-paginate

  - jekyll-sitemap

  - jekyll-gist

  - jekyll-feed

  - jekyll-include-cache



# Archives

category_archive:

  type: liquid

  path: /categories/

tag_archive:

  type: liquid

  path: /tags/



# HTML Compression

compress_html:

  clippings: all

  ignore:

    envs: development



# Atom feed

atom_feed:

  path: # blank (default) uses feed.xml

  hide: false
