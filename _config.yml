# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve`. If you change this file, please restart the server process.

# Site Settings
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "contrast" # Changed from "air" to "contrast" for more professional look
locale: "en-US"
title: "Munib Inam"
title_separator: "-"
name: &name "Munib Inam"
description: &description "PhD Student in Agricultural Economics at the University of Kentucky researching extreme weather impacts on agriculture and water resources"
url: https://munibinam.github.io
baseurl: "" # the subpath of your site, e.g. "/blog"
repository: "munibinam/munibinam.github.io"
teaser: /assets/images/bio-photo.jpg # Default teaser image
breadcrumbs: false # true, false (default)
words_per_minute: 160
search: true # Enable site search
search_full_content: true
search_provider: lunr

# Comments
comments:
  provider: false # Disabled for academic site

# SEO Related
google_site_verification: 
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# Social Sharing
twitter:
  username: 
facebook:
  username: 
  app_id:
  publisher:
og_image: /assets/images/bio-photo.jpg # Open Graph/Twitter default site image

# For specifying social profiles
social:
  type: Person
  name: "Munib Inam"
  links: # An array of links to social media profiles

# Analytics
analytics:
  provider: "google-gtag" # Updated to modern Google Analytics
  google:
    tracking_id: # Add your tracking ID here when ready

# Site Author
author:
  name: "Munib Inam"
  avatar: "/assets/images/bio-photo.jpg" # Updated path
  bio: "PhD Student in Agricultural Economics at the University of Kentucky studying extreme weather impacts on agriculture and water resources"
  location: "Lexington, Kentucky"
  employer: "University of Kentucky"
  email: "munib.inam@uky.edu"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:munib.inam@uky.edu"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://munibinam.github.io"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: # Add your Google Scholar URL when available
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/munib-inam"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: # Add your GitHub URL when available
    - label: "ORCID"
      icon: "ai ai-orcid-square ai-fw"
      url: # Add your ORCID when available

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      header:
        overlay_filter: "0.3"
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      header:
        overlay_filter: "0.3"
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: America/Kentucky/Louisville

# Plugins (updated names)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-redirect-from

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Custom additions for enhanced functionality
atom_feed:
  path: # blank (default) uses feed.xml
  hide: false

# Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:munib.inam@uky.edu"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/munib-inam"

# Site logo
logo: "/assets/images/site-logo.png" # Optional: add a small logo
